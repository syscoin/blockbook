{{define "main" -}}
daemon=1
server=1
{{if .Backend.Mainnet}}{{else}}testnet=1{{end}}
nolisten=1
txindex=1
disablewallet=1

rpcuser={{.IPC.RPCUser}}
rpcpassword={{.IPC.RPCPass}}
zmqpubhashtx={{template "IPC.MessageQueueBindingTemplate" .}}
zmqpubhashblock={{template "IPC.MessageQueueBindingTemplate" .}}
# SYSCOIN: leave zmqpubnevm unset so syscoind uses its main/test default
# (tcp://127.0.0.1:1111) and starts managed sysgeth with state bootstrap.

rpcworkqueue=1100
maxmempool=3000
dbcache=1000

{{if .Backend.Mainnet}}[main]{{else}}[test]{{end}}
rpcport={{.Ports.BackendRPC}}
{{- if .Backend.AdditionalParams}}
# generated from additional_params
{{- range $name, $value := .Backend.AdditionalParams}}
{{- if eq $name "addnode"}}
{{- range $index, $node := $value}}
addnode={{$node}}
{{- end}}
{{- else if eq $name "gethcommandline"}}
{{/* SYSCOIN: syscoind accepts one gethcommandline value per managed sysgeth arg. */}}
{{- range $index, $arg := $value}}
gethcommandline={{$arg}}
{{- end}}
{{- else}}
{{$name}}={{$value}}
{{- end}}
{{- end}}
{{- end}}
{{end}}
